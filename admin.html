<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin | QR kódy Platinum</title>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="QR Platinum"/>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icons/icon-192.png"/>
  <link rel="icon" type="image/png" href="icons/icon-192.png"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="theme-gold" data-protected="true" data-admin="true">
  <div class="app-shell">
    <aside class="sidebar">
      <a class="brand brand-sidebar" href="dashboard.html"><span class="brand-mark">QP</span><span class="brand-text"><strong>QR kódy Platinum</strong><small>Admin panel</small></span></a>
      <nav class="side-nav"><a href="dashboard.html">Prehľad</a><a href="companies.html">Firmy</a><a href="generator.html">Generátor QR</a><a href="license.html">Licencia</a><a class="active" href="admin.html">Admin</a></nav>
      <button id="logoutBtn" class="btn btn-secondary full sidebar-logout">Odhlásiť sa</button>
    </aside>

    <main class="content">
      <header class="content-topbar">
        <div><h1>Admin panel</h1><p class="muted">Používatelia, filtre, vymazanie účtu a fakturačná konfigurácia.</p></div>
        <div class="topbar-actions">
          <div class="theme-switcher" aria-label="Výber farby">
            <span class="theme-switcher-label">Motív</span>
            <button type="button" class="theme-dot is-gold" data-theme="gold" title="Zlatá"></button>
            <button type="button" class="theme-dot is-blue" data-theme="blue" title="Modrá"></button>
            <button type="button" class="theme-dot is-green" data-theme="green" title="Zelená"></button>
            <button type="button" class="theme-dot is-purple" data-theme="purple" title="Fialová"></button>
          </div>
          <div class="user-pill" id="userEmailPill">neprihlásený</div>
        </div>
      </header>

      <section class="panel-card">
        <div class="panel-head"><h2>Filtre</h2></div>
        <form class="form-grid" onsubmit="return false;">
          <label><span>Email</span><input type="text" id="adminFilterEmail" placeholder="Hľadaj podľa emailu"/></label>
          <label><span>Variabilný symbol</span><input type="text" id="adminFilterVs" placeholder="Hľadaj podľa VS"/></label>
          <label class="full-span"><span>Stav</span><select id="adminFilterStatus"><option value="">Všetko</option><option value="pending">Čaká na úhradu</option><option value="paid">Uhradené</option><option value="active">Aktívne</option><option value="blocked">Blokované</option></select></label>
        </form>
      </section>

      <section class="panel-card">
        <div class="panel-head"><h2>Používatelia</h2><button id="refreshAdminBtn" class="btn btn-secondary">Obnoviť</button></div>
        <div id="adminUsersList" class="admin-list"></div>
        <div id="adminStatus" class="inline-status"></div>
      </section>

      <section class="panel-card">
        <div class="panel-head"><h2>Fakturačná firma</h2></div>
        <form id="billingCompanyForm" class="form-grid">
          <label><span>Príjemca</span><input type="text" id="billingBeneficiaryName" required/></label>
          <label><span>IBAN</span><input type="text" id="billingIban" required/></label>
          <label><span>BIC</span><input type="text" id="billingBic"/></label>
          <label><span>Suma licencie (€)</span><input type="number" min="0" step="0.01" id="billingAmount" required/></label>
          <label class="full-span"><span>Poznámka k platbe</span><textarea id="billingPaymentNote"></textarea></label>
          <button class="btn btn-primary" type="submit">Uložiť fakturačné údaje</button>
        </form>
        <div id="billingCompanyStatus" class="inline-status"></div>
      </section>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
