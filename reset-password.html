<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset hesla | QR kódy Platinum</title>
  <meta name="theme-color" content="#0f172a"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="QR Platinum"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <link rel="icon" type="image/svg+xml" href="icon-192.svg"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body class="theme-gold">
  <div class="page-shell">
    <header class="topbar public-topbar">
      <a class="brand" href="index.html">
        <span class="brand-mark">QP</span>
        <span class="brand-text">
          <strong>QR kódy Platinum</strong>
          <small>Reset hesla</small>
        </span>
      </a>
      <a class="text-link" href="index.html">Späť na prihlásenie</a>
    </header>

    <main class="single-card-layout">
      <section class="access-card">
        <h1>Nastavenie nového hesla</h1>
        <p class="muted" id="resetIntroText">
          Otvor link z emailu a token sa doplní automaticky. Ak treba, môžeš ho vložiť aj ručne.
        </p>

        <form id="resetPasswordForm" class="form-stack">
          <label>
            <span>Reset token</span>
            <input id="resetToken" name="token" type="text" placeholder="token z emailu" required autocomplete="off"/>
          </label>

          <label>
            <span>Nové heslo</span>
            <input id="resetPassword" type="password" required minlength="8" autocomplete="new-password"/>
          </label>

          <label>
            <span>Potvrď nové heslo</span>
            <input id="resetPassword2" type="password" required minlength="8" autocomplete="new-password"/>
          </label>

          <button type="submit" class="btn btn-primary full">Uložiť nové heslo</button>
        </form>

        <div id="resetPasswordStatus" class="inline-status"></div>
      </section>
    </main>
  </div>

  <script>
    (function () {
      const params = new URLSearchParams(window.location.search);
      const token = params.get("token") || "";
      const tokenInput = document.getElementById("resetToken");
      const intro = document.getElementById("resetIntroText");

      if (tokenInput && token) {
        tokenInput.value = token;
        tokenInput.readOnly = true;
        tokenInput.setAttribute("aria-readonly", "true");
        tokenInput.title = "Token bol načítaný automaticky z reset linku.";

        if (intro) {
          intro.textContent = "Token bol načítaný automaticky z emailového linku. Stačí zadať nové heslo.";
        }
      }
    })();
  </script>

  <script src="app.js"></script>
</body>
</html>
